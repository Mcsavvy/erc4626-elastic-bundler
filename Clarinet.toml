[project]
name = "erc4626-elastic-bundler"
authors = ["erc4626 dev team"]
description = "Flexible ERC4626-compatible vault with elastic supply management"
telemetry = false
requirements = []

[contracts.elastic-bundler]
path = "contracts/elastic-bundler.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
